<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสำรวจความต้องการฝึกอบรม วิทยาลัยชุมชนสงขลา</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Font Awesome สำหรับไอคอนต่างๆ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด React ให้เบราว์เซอร์เข้าใจ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Modal scrollbar */
        .modal-scroll::-webkit-scrollbar { width: 6px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🟢 1. นำ URL ของ Web App ที่ได้จาก Google Apps Script มาวางที่นี่ (ลิงก์เดิมที่คุณทำผ่านแล้ว)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvr_iVFD_9JHcHB9L5NxWFt2rbZSCLaEOqacpkOTQ9lBaiqiJEDVhqdZqZmfRyGBOt/exec'; 

        // 🟢 2. นำ URL ของหน้าตาราง Google Sheets ของคุณมาวางที่นี่ (ก๊อปปี้ลิงก์จาก URL Bar ด้านบนมาวางได้เลย)
        const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Wsu2BkrYFGT6iEJ8asWfnoTLlEqavWGvXGesJ5P2ugY/edit?gid=81351765#gid=81351765'; 

        const CourseLabels = {
            digital: 'ด้านเทคโนโลยีดิจิทัล',
            craft: 'ด้านศิลปหัตถกรรม/งานฝีมือ',
            mechanic: 'ด้านช่างอุตสาหกรรมพื้นฐาน',
            agriculture: 'ด้านเกษตรกรรม',
            other: 'อื่น ๆ'
        };

        function App() {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [errors, setErrors] = useState({});
            const [submittedData, setSubmittedData] = useState(null);

            // --- Admin State ---
            const [currentView, setCurrentView] = useState('survey'); // 'survey', 'login', 'admin'
            
            // Login
            const [adminUsername, setAdminUsername] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            
            // ตั้งค่าข้อมูลจำลองเริ่มต้นไว้ใน State เลย เพื่อให้จำข้อมูลใหม่ได้เมื่อสลับหน้า
            const [adminData, setAdminData] = useState([
                { id: '1', timestamp: new Date().toISOString(), fullName: 'นายทดสอบ ระบบ', gender: 'ชาย', age: '16 – 25 ปี', education: 'ปวช.', domicile: 'จังหวัดสงขลา (อ.หาดใหญ่)', courseDigital: 'เขียนโปรแกรมเบื้องต้น', courseCraft: '', courseMechanic: '', courseAgriculture: '', courseOther: '', trainingTime: 'เสาร์-อาทิตย์', trainingLocation: 'วิทยาลัยชุมชน', suggestions: 'อยากให้มีอาหารกลางวัน' },
                { id: '2', timestamp: new Date(Date.now() - 86400000).toISOString(), fullName: 'นางสาวเรียนดี ขยันยิ่ง', gender: 'หญิง', age: '16 – 25 ปี', education: 'มัธยมศึกษาตอนปลาย', domicile: 'จังหวัดสงขลา (อ.เมือง)', courseDigital: '', courseCraft: 'ร้อยลูกปัด', courseMechanic: '', courseAgriculture: '', courseOther: '', trainingTime: 'ช่วงเย็น', trainingLocation: 'ศาลาประชาคมหมู่บ้าน', suggestions: 'อยากให้จัดใกล้บ้าน' }
            ]);
            
            const [isLoadingAdmin, setIsLoadingAdmin] = useState(false);

            // --- Edit Data State ---
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editFormData, setEditFormData] = useState(null);
            const [isSavingEdit, setIsSavingEdit] = useState(false);

            // --- Modal Dialog State ---
            const [dialog, setDialog] = useState({
                isOpen: false,
                type: 'alert',
                title: '',
                message: '',
                onConfirm: null,
                oldPassword: '',
                newPassword: '',
                confirmNewPassword: '',
                passwordError: ''
            });

            const showAlert = (title, message) => {
                setDialog(prev => ({ ...prev, isOpen: true, type: 'alert', title, message, onConfirm: null }));
            };

            const showConfirm = (title, message, onConfirmCallback) => {
                setDialog(prev => ({ ...prev, isOpen: true, type: 'confirm', title, message, onConfirm: onConfirmCallback }));
            };

            const showChangePassword = () => {
                setDialog(prev => ({ 
                    ...prev, isOpen: true, type: 'changePassword', 
                    title: 'เปลี่ยนรหัสผ่านผู้ดูแลระบบ', message: 'กรุณากรอกข้อมูลให้ครบถ้วน',
                    oldPassword: '', newPassword: '', confirmNewPassword: '', passwordError: ''
                }));
            };

            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

            // --- Survey Form Logic ---
            const initialFormState = {
                fullName: '', gender: '', age: '', education: '', educationOther: '',
                domicile: '', domicileSongkhlaAmphoe: '', domicileOther: '',
                courses: {
                    digital: { selected: false, detail: '' }, craft: { selected: false, detail: '' },
                    mechanic: { selected: false, detail: '' }, agriculture: { selected: false, detail: '' },
                    other: { selected: false, detail: '' },
                },
                trainingTime: '', trainingLocation: '', suggestions: ''
            };

            const [formData, setFormData] = useState(initialFormState);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: null }));
            };

            const handleCourseChange = (courseKey, field, value) => {
                setFormData(prev => ({
                    ...prev, courses: { ...prev.courses, [courseKey]: { ...prev.courses[courseKey], [field]: value } }
                }));
                if (errors.courses) setErrors(prev => ({ ...prev, courses: null }));
            };

            const validateForm = () => {
                const newErrors = {};
                if (!formData.fullName.trim()) newErrors.fullName = 'กรุณาระบุชื่อ-สกุล';
                if (!formData.gender) newErrors.gender = 'กรุณาเลือกเพศ';
                if (!formData.age) newErrors.age = 'กรุณาเลือกช่วงอายุ';
                if (!formData.education) newErrors.education = 'กรุณาเลือระดับการศึกษา';
                if (formData.education === 'อื่น ๆ' && !formData.educationOther.trim()) newErrors.educationOther = 'กรุณาระบุระดับการศึกษา';
                if (!formData.domicile) newErrors.domicile = 'กรุณาเลือกภูมิลำเนา';
                if (formData.domicile === 'จังหวัดสงขลา' && !formData.domicileSongkhlaAmphoe.trim()) newErrors.domicileSongkhlaAmphoe = 'กรุณาระบุอำเภอ';
                if (formData.domicile === 'อื่น ๆ' && !formData.domicileOther.trim()) newErrors.domicileOther = 'กรุณาระบุจังหวัด';

                const hasSelectedCourse = Object.values(formData.courses).some(c => c.selected);
                if (!hasSelectedCourse) newErrors.courses = 'กรุณาเลือกหลักสูตรอย่างน้อย 1 รายการ';

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!validateForm()) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }

                setIsSubmitting(true);

                const payload = {
                    action: 'insert',
                    fullName: formData.fullName,
                    gender: formData.gender,
                    age: formData.age,
                    education: formData.education === 'อื่น ๆ' ? `อื่น ๆ (${formData.educationOther})` : formData.education,
                    domicile: formData.domicile === 'จังหวัดสงขลา' ? `จังหวัดสงขลา (อ.${formData.domicileSongkhlaAmphoe})` 
                            : formData.domicile === 'อื่น ๆ' ? `อื่น ๆ (${formData.domicileOther})` : formData.domicile,
                    courseDigital: formData.courses.digital.selected ? formData.courses.digital.detail || 'สนใจ' : '',
                    courseCraft: formData.courses.craft.selected ? formData.courses.craft.detail || 'สนใจ' : '',
                    courseMechanic: formData.courses.mechanic.selected ? formData.courses.mechanic.detail || 'สนใจ' : '',
                    courseAgriculture: formData.courses.agriculture.selected ? formData.courses.agriculture.detail || 'สนใจ' : '',
                    courseOther: formData.courses.other.selected ? formData.courses.other.detail || 'สนใจ' : '',
                    trainingTime: formData.trainingTime,
                    trainingLocation: formData.trainingLocation,
                    suggestions: formData.suggestions
                };

                try {
                    if (GOOGLE_SCRIPT_URL !== '') {
                        const formBody = new URLSearchParams(payload).toString();
                        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody });
                    } else {
                        // จำลองการบันทึกข้อมูลเข้า State เลย จะได้เห็นข้อมูลในหน้า Admin
                        const newMockItem = {
                            id: Date.now().toString(),
                            timestamp: new Date().toISOString(),
                            ...payload
                        };
                        setAdminData(prevData => [newMockItem, ...prevData]); // เพิ่มข้อมูลใหม่ไว้ด้านบนสุด
                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }
                    
                    setSubmittedData(formData);
                    setIsSubmitted(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (error) {
                    showAlert("เกิดข้อผิดพลาด", "เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const startNewSurvey = () => {
                setFormData(initialFormState); setIsSubmitted(false); setSubmittedData(null); window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // --- Admin Logic ---
            const handleAdminLogin = (e) => {
                e.preventDefault();
                const savedUsername = localStorage.getItem('scc_admin_username') || 'admin';
                const savedPassword = localStorage.getItem('scc_admin_password') || 'admin123';

                if (adminUsername === savedUsername && adminPassword === savedPassword) {
                    setCurrentView('admin'); setLoginError(''); setAdminUsername(''); setAdminPassword('');
                    fetchAdminData();
                } else {
                    setLoginError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
                }
            };

            const submitChangePassword = () => {
                const { oldPassword, newPassword, confirmNewPassword } = dialog;
                const savedPassword = localStorage.getItem('scc_admin_password') || 'admin123';

                if (!oldPassword || !newPassword || !confirmNewPassword) { setDialog(prev => ({ ...prev, passwordError: 'กรุณากรอกให้ครบทุกช่อง' })); return; }
                if (oldPassword !== savedPassword) { setDialog(prev => ({ ...prev, passwordError: 'รหัสผ่านเดิมไม่ถูกต้อง' })); return; }
                if (newPassword !== confirmNewPassword) { setDialog(prev => ({ ...prev, passwordError: 'รหัสผ่านใหม่และการยืนยันไม่ตรงกัน' })); return; }
                if (newPassword.length < 6) { setDialog(prev => ({ ...prev, passwordError: 'รหัสผ่านใหม่ต้องมีความยาวอย่างน้อย 6 ตัวอักษร' })); return; }

                localStorage.setItem('scc_admin_password', newPassword);
                closeDialog();
                setTimeout(() => showAlert('สำเร็จ', 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว'), 300);
            };

            const fetchAdminData = async () => {
                if (GOOGLE_SCRIPT_URL === '') {
                    // ถ้าไม่มี URL ไม่ต้องโหลดใหม่ ให้ใช้ข้อมูลใน State ที่จำไว้
                    return; 
                }
                
                setIsLoadingAdmin(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=read`);
                    const data = await response.json();
                    setAdminData(data.data || []);
                } catch (error) {
                    showAlert("ดึงข้อมูลล้มเหลว", "โปรดตรวจสอบ URL ของ Google Script");
                } finally {
                    setIsLoadingAdmin(false);
                }
            };

            const handleDeleteData = async (id) => {
                showConfirm('ยืนยันการลบข้อมูล', 'คุณต้องการลบข้อมูลรายการนี้ใช่หรือไม่? (การกระทำนี้ไม่สามารถย้อนกลับได้)', async () => {
                    closeDialog();
                    // อัปเดต UI ให้ลบข้อมูลทันที
                    setAdminData(prev => prev.filter(item => item.id !== id));
                    
                    if (GOOGLE_SCRIPT_URL !== '') {
                        try {
                            await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: new URLSearchParams({ action: 'delete', id: id }).toString()
                            });
                        } catch (error) { fetchAdminData(); }
                    }
                });
            };

            // --- Edit Data Logic ---
            const openEditModal = (rowData) => {
                setEditFormData({ ...rowData }); // Copy ข้อมูล
                setIsEditModalOpen(true);
            };

            const handleEditFormChange = (e) => {
                const { name, value } = e.target;
                setEditFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSaveEdit = async (e) => {
                e.preventDefault();
                setIsSavingEdit(true);

                try {
                    // 1. อัปเดตข้อมูลใน UI ทันที 
                    setAdminData(prev => prev.map(item => item.id === editFormData.id ? editFormData : item));
                    
                    // 2. ส่งข้อมูลไปอัปเดตที่ Google Apps Script
                    if (GOOGLE_SCRIPT_URL !== '') {
                        const payload = new URLSearchParams({
                            action: 'update',
                            ...editFormData
                        }).toString();

                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: payload
                        });
                    } else {
                        // จำลอง delay
                        await new Promise(resolve => setTimeout(resolve, 800));
                    }
                    
                    setIsEditModalOpen(false);
                    
                } catch (error) {
                    console.error("Error updating data:", error);
                    showAlert("ล้มเหลว", "บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่");
                } finally {
                    setIsSavingEdit(false);
                }
            };

            // --- Components ---
            const DialogModal = () => {
                if (!dialog.isOpen) return null;
                
                if (dialog.type === 'changePassword') {
                    return (
                        <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="h-2 w-full bg-yellow-500"></div>
                                <div className="p-6">
                                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2"><i className="fas fa-key text-yellow-500"></i> {dialog.title}</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm mb-1">รหัสผ่านเดิม</label>
                                            <input type="password" value={dialog.oldPassword} onChange={(e) => setDialog({...dialog, oldPassword: e.target.value, passwordError: ''})} className="w-full p-2 border rounded" />
                                        </div>
                                        <div>
                                            <label className="block text-sm mb-1">รหัสผ่านใหม่</label>
                                            <input type="password" value={dialog.newPassword} onChange={(e) => setDialog({...dialog, newPassword: e.target.value, passwordError: ''})} className="w-full p-2 border rounded" />
                                        </div>
                                        <div>
                                            <label className="block text-sm mb-1">ยืนยันรหัสผ่านใหม่</label>
                                            <input type="password" value={dialog.confirmNewPassword} onChange={(e) => setDialog({...dialog, confirmNewPassword: e.target.value, passwordError: ''})} className="w-full p-2 border rounded" />
                                        </div>
                                        {dialog.passwordError && <div className="text-red-500 text-sm">{dialog.passwordError}</div>}
                                    </div>
                                    <div className="flex justify-end gap-3 mt-6">
                                        <button onClick={closeDialog} className="px-4 py-2 bg-slate-200 rounded">ยกเลิก</button>
                                        <button onClick={submitChangePassword} className="px-4 py-2 bg-yellow-600 text-white rounded">บันทึก</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
                            <div className={`h-2 w-full ${dialog.type === 'alert' ? 'bg-blue-500' : 'bg-red-500'}`}></div>
                            <div className="p-6">
                                <h3 className="text-xl font-bold mb-2">{dialog.title}</h3>
                                <p className="mb-6">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'confirm' && <button onClick={closeDialog} className="px-4 py-2 bg-slate-200 rounded">ยกเลิก</button>}
                                    <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); else closeDialog(); }} className="px-4 py-2 bg-blue-600 text-white rounded">ตกลง</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const EditDataModal = () => {
                if (!isEditModalOpen || !editFormData) return null;

                return (
                    <div className="fixed inset-0 bg-slate-900/70 z-50 flex items-center justify-center p-2 sm:p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col overflow-hidden animate-fade-in">
                            <div className="bg-blue-700 text-white p-4 flex justify-between items-center shrink-0">
                                <h2 className="text-lg font-bold flex items-center gap-2">
                                    <i className="fas fa-edit"></i> รายละเอียด / แก้ไขข้อมูล
                                </h2>
                                <button onClick={() => setIsEditModalOpen(false)} className="text-blue-100 hover:text-white p-1 rounded hover:bg-blue-600 transition-colors">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>

                            <div className="p-4 sm:p-6 overflow-y-auto modal-scroll bg-slate-50 flex-1">
                                <form id="editForm" onSubmit={handleSaveEdit} className="space-y-6">
                                    
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <h3 className="font-semibold text-blue-800 border-b pb-2 mb-4">ข้อมูลส่วนตัว</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="md:col-span-1">
                                                <label className="block text-sm text-slate-600 mb-1">วันที่ส่งข้อมูล</label>
                                                <input type="text" value={new Date(editFormData.timestamp).toLocaleString('th-TH')} disabled className="w-full p-2 bg-slate-100 border rounded text-slate-500 text-sm" />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm text-slate-600 mb-1">ชื่อ-สกุล</label>
                                                <input type="text" name="fullName" value={editFormData.fullName || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500" required />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">เพศ</label>
                                                <select name="gender" value={editFormData.gender || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500">
                                                    <option value="ชาย">ชาย</option>
                                                    <option value="หญิง">หญิง</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">ช่วงอายุ</label>
                                                <select name="age" value={editFormData.age || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500">
                                                    <option value="13 – 15 ปี">13 – 15 ปี</option>
                                                    <option value="16 – 25 ปี">16 – 25 ปี</option>
                                                    <option value="25 ปีขึ้นไป">25 ปีขึ้นไป</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <h3 className="font-semibold text-blue-800 border-b pb-2 mb-4">การศึกษาและภูมิลำเนา</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">ระดับการศึกษา (ระบุข้อความ)</label>
                                                <input type="text" name="education" value={editFormData.education || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">ภูมิลำเนา (ระบุข้อความ)</label>
                                                <input type="text" name="domicile" value={editFormData.domicile || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <h3 className="font-semibold text-green-700 border-b pb-2 mb-4">ความต้องการฝึกอบรม</h3>
                                        <div className="space-y-3 mb-4">
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1 font-medium">{CourseLabels.digital}</label>
                                                <input type="text" name="courseDigital" value={editFormData.courseDigital || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1 font-medium">{CourseLabels.craft}</label>
                                                <input type="text" name="courseCraft" value={editFormData.courseCraft || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1 font-medium">{CourseLabels.mechanic}</label>
                                                <input type="text" name="courseMechanic" value={editFormData.courseMechanic || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1 font-medium">{CourseLabels.agriculture}</label>
                                                <input type="text" name="courseAgriculture" value={editFormData.courseAgriculture || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1 font-medium">{CourseLabels.other}</label>
                                                <input type="text" name="courseOther" value={editFormData.courseOther || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 pt-4 border-t border-slate-100">
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">เวลาที่สะดวก</label>
                                                <input type="text" name="trainingTime" value={editFormData.trainingTime || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-600 mb-1">สถานที่</label>
                                                <input type="text" name="trainingLocation" value={editFormData.trainingLocation || ''} onChange={handleEditFormChange} className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-green-500" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <h3 className="font-semibold text-yellow-700 border-b pb-2 mb-4">ข้อเสนอแนะเพิ่มเติม</h3>
                                        <textarea name="suggestions" value={editFormData.suggestions || ''} onChange={handleEditFormChange} rows="3" className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-yellow-500 resize-y"></textarea>
                                    </div>

                                </form>
                            </div>

                            <div className="bg-white border-t p-4 flex justify-end gap-3 shrink-0">
                                <button type="button" onClick={() => setIsEditModalOpen(false)} className="px-5 py-2.5 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">
                                    ยกเลิก
                                </button>
                                <button type="submit" form="editForm" disabled={isSavingEdit} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2 disabled:opacity-50">
                                    {isSavingEdit ? <><i className="fas fa-spinner fa-spin"></i> กำลังบันทึก</> : <><i className="fas fa-save"></i> บันทึกการแก้ไข</>}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Render Views ---
            if (currentView === 'login') {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <DialogModal />
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
                            <div className="text-center mb-6">
                                <i className="fas fa-user-shield text-4xl text-blue-600 mb-3"></i>
                                <h2 className="text-2xl font-bold">เข้าสู่ระบบจัดการ</h2>
                            </div>
                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm mb-1">ชื่อผู้ใช้ (Username)</label>
                                    <input type="text" value={adminUsername} onChange={e => setAdminUsername(e.target.value)} className="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-sm mb-1">รหัสผ่าน (Password)</label>
                                    <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500" />
                                </div>
                                {loginError && <div className="text-red-500 text-sm">{loginError}</div>}
                                <button type="submit" className="w-full bg-blue-700 text-white py-3 rounded font-bold hover:bg-blue-800">เข้าสู่ระบบ</button>
                            </form>
                            <button onClick={() => setCurrentView('survey')} className="w-full mt-4 text-slate-500 text-sm hover:underline">กลับหน้าแบบสอบถาม</button>
                        </div>
                    </div>
                );
            }

            if (currentView === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-50 p-4 sm:p-6 lg:p-8">
                        <DialogModal />
                        <EditDataModal />
                        
                        <div className="max-w-7xl mx-auto space-y-4">
                            <div className="bg-white p-4 rounded-xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
                                <h1 className="text-xl font-bold flex items-center gap-2"><i className="fas fa-database text-blue-600"></i> ระบบจัดการข้อมูล</h1>
                                <div className="flex flex-wrap gap-2">
                                    {/* 🟢 แก้ไขปุ่มนี้ให้ใช้ลิงก์จากตัวแปร GOOGLE_SHEET_URL */}
                                    <button onClick={() => window.open(GOOGLE_SHEET_URL || 'https://docs.google.com/spreadsheets', '_blank')} className="px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm font-semibold border border-green-200"><i className="fas fa-table"></i> Google Sheets</button>
                                    <button onClick={showChangePassword} className="px-4 py-2 bg-yellow-50 text-yellow-700 rounded-lg text-sm font-semibold border border-yellow-200"><i className="fas fa-key"></i> เปลี่ยนรหัส</button>
                                    <button onClick={() => setCurrentView('survey')} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-semibold border"><i className="fas fa-sign-out-alt"></i> ออก</button>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col h-[75vh]">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="font-semibold text-slate-700">รายการทั้งหมด ({adminData.length})</h2>
                                    <button onClick={fetchAdminData} className="px-3 py-1.5 bg-white border rounded text-sm hover:bg-slate-50 text-blue-600"><i className="fas fa-sync-alt"></i> รีเฟรช</button>
                                </div>
                                
                                <div className="overflow-x-auto flex-1">
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead className="text-xs text-slate-600 bg-slate-100 uppercase border-b sticky top-0 z-10">
                                            <tr>
                                                <th className="px-4 py-3 text-center">#</th>
                                                <th className="px-4 py-3">วันที่</th>
                                                <th className="px-4 py-3">ชื่อ-สกุล</th>
                                                <th className="px-4 py-3">เพศ/อายุ</th>
                                                <th className="px-4 py-3">การศึกษา</th>
                                                <th className="px-4 py-3">ภูมิลำเนา</th>
                                                <th className="px-4 py-3">หลักสูตร (ย่อ)</th>
                                                <th className="px-4 py-3 text-center sticky right-0 bg-slate-100 shadow-[-2px_0_5px_rgba(0,0,0,0.05)]">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {adminData.map((row, idx) => (
                                                <tr key={row.id || idx} className="hover:bg-blue-50 transition-colors">
                                                    <td className="px-4 py-3 text-center text-slate-400">{idx + 1}</td>
                                                    <td className="px-4 py-3 text-xs text-slate-500">{new Date(row.timestamp).toLocaleDateString('th-TH')}</td>
                                                    <td className="px-4 py-3 font-medium">{row.fullName}</td>
                                                    <td className="px-4 py-3"><span className="text-blue-600">{row.gender}</span> / {row.age}</td>
                                                    <td className="px-4 py-3 truncate max-w-[150px]" title={row.education}>{row.education}</td>
                                                    <td className="px-4 py-3 truncate max-w-[150px]" title={row.domicile}>{row.domicile}</td>
                                                    <td className="px-4 py-3 text-xs text-slate-500">
                                                        <div className="truncate max-w-[150px]" title={[row.courseDigital, row.courseCraft, row.courseMechanic, row.courseAgriculture, row.courseOther].filter(Boolean).join(', ')}>
                                                            {[row.courseDigital, row.courseCraft, row.courseMechanic, row.courseAgriculture, row.courseOther].filter(Boolean).join(', ') || '-'}
                                                        </div>
                                                    </td>
                                                    <td className="px-4 py-2 text-center sticky right-0 bg-white group-hover:bg-blue-50 shadow-[-2px_0_5px_rgba(0,0,0,0.05)]">
                                                        <div className="flex justify-center gap-2">
                                                            <button onClick={() => openEditModal(row)} className="px-2 py-1 text-xs bg-blue-100 text-blue-700 rounded hover:bg-blue-200" title="ดู/แก้ไขข้อมูลทั้งหมด">
                                                                <i className="fas fa-search-plus mr-1"></i> รายละเอียด
                                                            </button>
                                                            <button onClick={() => handleDeleteData(row.id)} className="px-2 py-1 text-xs bg-red-100 text-red-600 rounded hover:bg-red-200" title="ลบ">
                                                                <i className="fas fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                            {adminData.length === 0 && (
                                                <tr><td colSpan="8" className="px-4 py-8 text-center text-slate-500">ไม่มีข้อมูล</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (isSubmitted && submittedData) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                        <div className="bg-white p-8 rounded-xl shadow text-center max-w-lg">
                            <i className="fas fa-check-circle text-6xl text-green-500 mb-4"></i>
                            <h2 className="text-2xl font-bold mb-2">บันทึกข้อมูลสำเร็จ</h2>
                            <p className="mb-6 text-slate-600">ขอบคุณที่ให้ความร่วมมือ</p>
                            <button onClick={startNewSurvey} className="px-6 py-2 bg-blue-600 text-white rounded-lg">ทำแบบสอบถามใหม่</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 py-8 px-4 sm:px-6 lg:px-8 text-slate-800 flex flex-col items-center">
                    <DialogModal />
                    <div className="w-full max-w-4xl bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
                        <div className="bg-blue-800 px-6 py-8 text-center text-white border-b-4 border-yellow-500">
                            <h1 className="text-2xl sm:text-3xl font-bold mb-2">แบบสำรวจความต้องการในการฝึกอบรมอาชีพ</h1>
                            <p className="mt-3 text-sm text-yellow-300 font-semibold bg-blue-900/50 px-4 py-1 rounded-full inline-block">วิทยาลัยชุมชนสงขลา</p>
                        </div>

                        <div className="p-6 sm:p-10">
                            <form onSubmit={handleSubmit} className="space-y-10">
                                {/* ส่วนที่ 1 */}
                                <section className="bg-white rounded-lg border p-5 shadow-sm">
                                    <h2 className="text-xl font-bold mb-4 border-b pb-2">ส่วนที่ 1: ข้อมูลทั่วไป</h2>
                                    <div className="space-y-4">
                                        <div><label className="block mb-1">ชื่อ-สกุล *</label><input type="text" name="fullName" value={formData.fullName} onChange={handleChange} className="w-full p-2 border rounded" /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block mb-1">เพศ *</label>
                                                <div className="flex gap-4 p-2 border rounded">
                                                    <label><input type="radio" name="gender" value="ชาย" onChange={handleChange} /> ชาย</label>
                                                    <label><input type="radio" name="gender" value="หญิง" onChange={handleChange} /> หญิง</label>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block mb-1">อายุ *</label>
                                                <div className="flex flex-wrap gap-2 p-2 border rounded">
                                                    <label><input type="radio" name="age" value="13 – 15 ปี" onChange={handleChange} /> 13-15</label>
                                                    <label><input type="radio" name="age" value="16 – 25 ปี" onChange={handleChange} /> 16-25</label>
                                                    <label><input type="radio" name="age" value="25 ปีขึ้นไป" onChange={handleChange} /> 25+</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block mb-1">ระดับการศึกษา *</label>
                                            <div className="grid grid-cols-2 gap-2 p-2 border rounded">
                                                {['ประถมศึกษา', 'มัธยมศึกษาตอนต้น', 'มัธยมศึกษาตอนปลาย', 'ปวช.', 'ปวส.', 'ไม่ได้รับการศึกษาในระดับใด'].map(edu => (
                                                    <label key={edu}><input type="radio" name="education" value={edu} onChange={handleChange} /> {edu}</label>
                                                ))}
                                                <label className="col-span-2 flex items-center gap-2">
                                                    <input type="radio" name="education" value="อื่น ๆ" onChange={handleChange} /> อื่นๆ 
                                                    <input type="text" name="educationOther" value={formData.educationOther} onChange={handleChange} disabled={formData.education !== 'อื่น ๆ'} className="border-b px-2 outline-none" />
                                                </label>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block mb-1">ภูมิลำเนา *</label>
                                            <div className="grid gap-2 p-2 border rounded">
                                                <label className="flex items-center gap-2">
                                                    <input type="radio" name="domicile" value="จังหวัดสงขลา" onChange={handleChange} /> สงขลา (อ. <input type="text" name="domicileSongkhlaAmphoe" value={formData.domicileSongkhlaAmphoe} onChange={handleChange} disabled={formData.domicile !== 'จังหวัดสงขลา'} className="border-b w-24 outline-none"/>)
                                                </label>
                                                <div className="flex gap-4">
                                                    <label><input type="radio" name="domicile" value="จังหวัดยะลา" onChange={handleChange} /> ยะลา</label>
                                                    <label><input type="radio" name="domicile" value="จังหวัดปัตตานี" onChange={handleChange} /> ปัตตานี</label>
                                                    <label><input type="radio" name="domicile" value="จังหวัดนราธิวาส" onChange={handleChange} /> นราธิวาส</label>
                                                </div>
                                                <label className="flex items-center gap-2">
                                                    <input type="radio" name="domicile" value="อื่น ๆ" onChange={handleChange} /> อื่นๆ (จ. <input type="text" name="domicileOther" value={formData.domicileOther} onChange={handleChange} disabled={formData.domicile !== 'อื่น ๆ'} className="border-b w-32 outline-none"/>)
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* ส่วนที่ 2 */}
                                <section className="bg-white rounded-lg border p-5 shadow-sm">
                                    <h2 className="text-xl font-bold mb-4 border-b pb-2">ส่วนที่ 2: ความต้องการ</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block mb-1">หลักสูตร (เลือกได้มากกว่า 1) *</label>
                                            <div className="space-y-2 p-2 border rounded">
                                                {Object.entries(CourseLabels).map(([key, label]) => (
                                                    <div key={key} className="flex flex-col sm:flex-row gap-2">
                                                        <label className="flex items-center gap-2 w-48">
                                                            <input type="checkbox" checked={formData.courses[key].selected} onChange={(e) => handleCourseChange(key, 'selected', e.target.checked)} /> {label}
                                                        </label>
                                                        <input type="text" placeholder="ระบุรายละเอียด..." value={formData.courses[key].detail} onChange={(e) => handleCourseChange(key, 'detail', e.target.value)} disabled={!formData.courses[key].selected} className="flex-1 border-b px-2 outline-none disabled:opacity-30" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="block mb-1">เวลาที่สะดวก</label><input type="text" name="trainingTime" value={formData.trainingTime} onChange={handleChange} className="w-full p-2 border rounded" /></div>
                                            <div><label className="block mb-1">สถานที่ที่สะดวก</label><input type="text" name="trainingLocation" value={formData.trainingLocation} onChange={handleChange} className="w-full p-2 border rounded" /></div>
                                        </div>
                                        <div><label className="block mb-1">ข้อเสนอแนะ</label><textarea name="suggestions" value={formData.suggestions} onChange={handleChange} className="w-full p-2 border rounded" rows="2"></textarea></div>
                                    </div>
                                </section>
                                
                                {Object.keys(errors).length > 0 && <div className="text-red-500 text-center">กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน</div>}

                                <button type="submit" disabled={isSubmitting} className="w-full py-4 bg-blue-700 text-white font-bold rounded-xl text-lg hover:bg-blue-800 disabled:opacity-50">ส่งข้อมูล</button>
                            </form>
                        </div>
                    </div>
                    <button onClick={() => setCurrentView('login')} className="mt-8 text-slate-400 hover:text-slate-600">เข้าสู่ระบบเจ้าหน้าที่</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
